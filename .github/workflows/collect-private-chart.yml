name: Collect private NetEase chart

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: echorank-private-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_USER_ID: ${{ secrets.SUPABASE_USER_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install EchoRank
        run: python -m pip install .

      - name: Collect and upload private chart
        run: >-
          python -m echorank cloud-update
          --state-root "${RUNNER_TEMP}/echorank-state"
          --frontend "${RUNNER_TEMP}/echorank-frontend"
